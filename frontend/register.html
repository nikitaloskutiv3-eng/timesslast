<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/register.css">
    <title>Register - Timess</title>
</head>
<body>

<button class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>

<div class="auth-container">
    <div class="auth-header">
        <div class="auth-logo">💬</div>
        <div class="auth-title">Timess</div>
        <div class="auth-subtitle">Создай новый аккаунт</div>
    </div>
    
    <div class="error-message" id="error"></div>
    <div class="success-message" id="success"></div>
    
    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input id="username" type="text" placeholder="Придумай username" required minlength="3">
        </div>
        
        <div class="form-group">
            <label>Пароль</label>
            <input id="password" type="password" placeholder="Придумай пароль" required minlength="6">
        </div>
        
        <div class="form-group">
            <label>Подтверди пароль</label>
            <input id="passwordConfirm" type="password" placeholder="Повтори пароль" required minlength="6">
        </div>
        
        <button type="submit" class="submit-btn">Зарегистрироваться</button>
    </form>
    
    <div class="auth-link">
        Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
</div>

<script src="js/register.js"></script>
</body>
</html>
