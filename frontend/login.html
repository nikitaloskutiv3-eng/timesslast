<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Login - Timess</title>
</head>
<body>

<button class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>

<div class="auth-container">
    <div class="auth-header">
        <div class="auth-logo">💬</div>
        <div class="auth-title">Messenger</div>
        <div class="auth-subtitle">Войди в свой аккаунт</div>
    </div>
    
    <div class="error-message" id="error"></div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input id="username" type="text" placeholder="Введи @username" required>
        </div>
        
        <div class="form-group">
            <label>Пароль</label>
            <input id="password" type="password" placeholder="Введи пароль" required>
        </div>
        
        <button type="submit" class="submit-btn">Войти</button>
    </form>
    
    <div class="auth-link">
        Нет аккаунта? <a href="register.html">Зарегистрируйся</a>
    </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
